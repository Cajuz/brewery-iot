# ─────────────────────────────────────────────────────────────────
#  Mosquitto — Configuração do Broker MQTT
#  Broker recebe publicações do ESP32 (DS18B20 temperatura)
#  e entrega ao Node-RED via subscribe.
# ─────────────────────────────────────────────────────────────────

# ── Listener TCP (ESP32 + Node-RED) ──────────────────────────────
listener 1883
protocol mqtt

# ── Listener WebSocket (opcional, ferramentas web) ───────────────
listener 9001
protocol websockets

# ── Autenticação ─────────────────────────────────────────────────
allow_anonymous false
password_file /mosquitto/config/passwd

# ── Persistência ─────────────────────────────────────────────────
persistence true
persistence_location /mosquitto/data/

# ── Log ──────────────────────────────────────────────────────────
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

# ── QoS / Conexão ────────────────────────────────────────────────
# Keepalive padrão tolerante para ESP32 com WiFi instável
max_keepalive 120
# Limita taxa de conexões para evitar flood
connection_messages true
