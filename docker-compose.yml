# ─────────────────────────────────────────────────────────────────
#  BREWERY IoT — docker-compose.yml
# ─────────────────────────────────────────────────────────────────

services:

  # ── Broker MQTT ───────────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: brewery_mosquitto
    restart: unless-stopped
    ports:
      - "${MQTT_BROKER_PORT:-1883}:1883"
      - "${MQTT_WS_PORT:-9001}:9001"
    environment:
      - MQTT_NODERED_USER=${MQTT_NODERED_USER}
      - MQTT_NODERED_PASSWORD=${MQTT_NODERED_PASSWORD}
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto/config/passwd:/mosquitto/config/passwd       # sem :ro — entrypoint faz chown
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -t '$$SYS/#' -C 1 -u \"$$MQTT_NODERED_USER\" -P \"$$MQTT_NODERED_PASSWORD\" --quiet"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - brewery_net

  # ── Node-RED ──────────────────────────────────────────────────
  nodered:
    image: nodered/node-red:3.1
    container_name: brewery_nodered
    restart: unless-stopped
    depends_on:
      mosquitto:
        condition: service_healthy
    ports:
      - "${NODERED_PORT:-1880}:1880"
    environment:
      - TZ=America/Sao_Paulo
      - NODE_RED_CREDENTIAL_SECRET=${NODERED_CREDENTIAL_SECRET}
      - MQTT_BROKER_HOST=mosquitto
      - MQTT_BROKER_PORT=${MQTT_BROKER_PORT:-1883}
      - MQTT_NODERED_USER=${MQTT_NODERED_USER}
      - MQTT_NODERED_PASSWORD=${MQTT_NODERED_PASSWORD}
      - MQTT_TOPIC_TEMPERATURE=${MQTT_TOPIC_TEMPERATURE}
      - SHEETS_SPREADSHEET_ID=${SHEETS_SPREADSHEET_ID}
      - SHEETS_CREDENTIALS_PATH=${SHEETS_CREDENTIALS_PATH}
      - SHEETS_TAB_READINGS=${SHEETS_TAB_READINGS}
      - SHEETS_TAB_EVENTS=${SHEETS_TAB_EVENTS}
      - SHEETS_TAB_HEALTH=${SHEETS_TAB_HEALTH}
      - QUEUE_MAX_SIZE=${QUEUE_MAX_SIZE:-500}
      - RETRY_DELAY_MS=${RETRY_DELAY_MS:-60000}
      - RETRY_MAX_ATTEMPTS=${RETRY_MAX_ATTEMPTS:-5}
      - BUFFER_CSV_PATH=${BUFFER_CSV_PATH:-/data/buffer.csv}
      - SENSOR_TEMP_MIN=${SENSOR_TEMP_MIN:--55}
      - SENSOR_TEMP_MAX=${SENSOR_TEMP_MAX:-125}
      - NODERED_ADMIN_USER=${NODERED_ADMIN_USER}
      - NODERED_ADMIN_PASSWORD=${NODERED_ADMIN_PASSWORD}
    volumes:
      - ./node-red/data:/data                          # settings.js, package.json
      - ./node-red/flows:/data/flows                   # brewery_flow.json
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1880"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s                               # Node-RED demora instalar plugins
    networks:
      - brewery_net

networks:
  brewery_net:
    driver: bridge
