version: '3.8'

networks:
  brewery_net:
    driver: bridge

volumes:
  mosquitto_data:
  mosquitto_log:
  nodered_data:
  mongo_data:
  grafana_data:

services:

  # ── MQTT Broker ──────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mqtt-broker
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./broker/config/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    networks:
      - brewery_net
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -t '$$SYS/#' -C 1 -i healthcheck -W 3"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── MongoDB ──────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./database/init/init.js:/docker-entrypoint-initdb.d/init.js
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_DB}
    networks:
      - brewery_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Node-RED (ETL) ───────────────────────────────────
  node-red:
    build: ./etl
    container_name: node-red
    restart: unless-stopped
    ports:
      - "${NODE_RED_PORT}:1880"
    volumes:
      - nodered_data:/data
      - ./etl/flows:/data/flows
    environment:
      - TZ=America/Sao_Paulo
      - MONGO_HOST=${MONGO_HOST}
      - MONGO_PORT=${MONGO_PORT}
      - MONGO_DB=${MONGO_DB}
      - MQTT_BROKER_HOST=mosquitto
      - MQTT_BROKER_PORT=${MQTT_BROKER_PORT}
      - MQTT_TOPIC_SENSORS=${MQTT_TOPIC_SENSORS}
      - VOLUME_META_LITROS=${VOLUME_META_LITROS}
      - TEMP_MIN=${TEMP_MIN}
      - TEMP_MAX=${TEMP_MAX}
      - SENSOR_TIMEOUT_SECONDS=${SENSOR_TIMEOUT_SECONDS}
    depends_on:
      mosquitto:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - brewery_net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:1880/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Grafana ──────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./dashboard/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_INSTALL_PLUGINS=${GF_INSTALL_PLUGINS}
      - GF_SERVER_DOMAIN=localhost
      - TZ=America/Sao_Paulo
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - brewery_net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
